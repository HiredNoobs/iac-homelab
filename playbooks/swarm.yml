---
- hosts: all
  gather_facts: false
  tasks:
    - name: Group all docker hosts
      group_by:
        key: "docker_nodes"
      when: swarm_role is defined

- hosts: docker_nodes
  become: yes
  gather_facts: false
  roles:
    - docker

- hosts: docker_nodes
  become: yes
  gather_facts: false
  tasks:
    - name: Group managers
      group_by:
        key: "{{ swarm_cluster }}_managers"
      when: swarm_role == "manager"

- hosts: docker_nodes
  become: yes
  gather_facts: false
  roles:
    - swarm
