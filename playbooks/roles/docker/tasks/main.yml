- name: Install required packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /usr/share/keyrings/docker.gpg
    mode: '0644'

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/docker.gpg] https://download.docker.com/linux/debian trixie stable"
    state: present

- name: Unhold Docker packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: install
  loop:
    - docker-ce
    - docker-ce-cli
    - containerd.io

- name: Install Docker
  ansible.builtin.apt:
    name:
      - "docker-ce={{ docker_package_versions.docker_ce }}"
      - "docker-ce-cli={{ docker_package_versions.docker_ce_cli }}"
      - "containerd.io={{ docker_package_versions.containerd_io }}"
    state: present
    update_cache: yes

# Prevent the patching role from updating Docker...
- name: Hold Docker packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - docker-ce
    - docker-ce-cli
    - containerd.io

- name: Enable Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: yes
