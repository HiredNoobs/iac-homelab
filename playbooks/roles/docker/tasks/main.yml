- name: Install required packages
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Add Docker GPG key
  get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /usr/share/keyrings/docker.gpg
    mode: '0644'

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/docker.gpg] https://download.docker.com/linux/debian trixie stable"
    state: present

- name: Get installed Docker package versions
  shell: "dpkg-query -W -f='${Version}' {{ item }} 2>/dev/null || true"
  register: docker_versions
  changed_when: false
  loop:
    - docker-ce
    - docker-ce-cli
    - containerd.io

- name: Determine if Docker install/update is required
  set_fact:
    docker_install_required: >-
      {{ docker_versions.results[0].stdout != docker_package_versions.docker_ce
         or docker_versions.results[1].stdout != docker_package_versions.docker_ce_cli
         or docker_versions.results[2].stdout != docker_package_versions.containerd_io }}

- block:
    - name: Unhold Docker packages
      command: "apt-mark unhold {{ item }}"
      loop:
        - docker-ce
        - docker-ce-cli
        - containerd.io
      changed_when: false

    - name: Install Docker packages
      apt:
        name:
          - "docker-ce={{ docker_package_versions.docker_ce }}"
          - "docker-ce-cli={{ docker_package_versions.docker_ce_cli }}"
          - "containerd.io={{ docker_package_versions.containerd_io }}"
        state: present
        update_cache: yes
        cache_valid_time: 3600
  when: docker_install_required
  always:
    - name: Hold Docker packages
      command: "apt-mark hold {{ item }}"
      loop:
        - docker-ce
        - docker-ce-cli
        - containerd.io
      changed_when: false

- name: Enable Docker
  service:
    name: docker
    state: started
    enabled: yes
