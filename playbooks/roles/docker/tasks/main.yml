- name: Install required packages
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: Add Docker GPG key
  get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /usr/share/keyrings/docker.gpg
    mode: '0644'

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/docker.gpg] https://download.docker.com/linux/debian trixie stable"
    state: present

- name: Check if Docker packages exist
  shell: "dpkg-query -W -f='${Status}' {{ item }} 2>/dev/null || true"
  register: docker_pkg_status
  changed_when: false
  loop:
    - docker-ce
    - docker-ce-cli
    - containerd.io

- block:
    - name: Unhold Docker packages
      dpkg_selections:
        name: "{{ item }}"
        selection: install
      loop:
        - docker-ce
        - docker-ce-cli
        - containerd.io

    - name: Install Docker
      apt:
        name:
          - "docker-ce={{ docker_package_versions.docker_ce }}"
          - "docker-ce-cli={{ docker_package_versions.docker_ce_cli }}"
          - "containerd.io={{ docker_package_versions.containerd_io }}"
        state: present
        update_cache: yes
        cache_valid_time: 3600
  always:
      # Prevent the patching role from updating Docker...
    - name: Hold Docker packages
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - docker-ce
        - docker-ce-cli
        - containerd.io

- name: Enable Docker
  service:
    name: docker
    state: started
    enabled: yes
